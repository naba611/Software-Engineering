{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Esports System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Raleway', sans-serif;
      background: #080c10;
      overflow: hidden;
      position: relative;
    }

    /* Background */
    .bg-image {
      position: fixed;
      inset: 0;
      background: url('{% static "images/cse412.jpg" %}') no-repeat center center;
      background-size: cover;
      z-index: 0;
    }

    /* ✅ FIXED OVERLAY (matches your reference) */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to right,
          rgba(5, 10, 15, 0.05) 0%,
          rgba(5, 10, 15, 0.18) 35%,
          rgba(5, 10, 15, 0.40) 65%,
          rgba(5, 10, 15, 0.65) 100%
        ),
        linear-gradient(to bottom,
          rgba(0,0,0,0.15) 0%,
          transparent 50%,
          rgba(0,0,0,0.2) 100%
        );
      z-index: 1;
    }

    /* ✅ Softer vignette */
   

    /* Login Card */
    .login-panel {
      position: relative;
      z-index: 10;
      width: 420px;
      padding: 48px 52px;
      background: rgba(6, 10, 14, 0.6); /* lighter for better balance */
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }

    .brand {
      margin-bottom: 40px;
      text-align: center;
    }

    .brand-icon {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: #c8a0a0;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8a7a7a;
      margin-bottom: 7px;
    }

    .field-group input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: #f0e0e0;
      font-size: 14px;
      transition: 0.2s;
    }

    .field-group input:focus {
      border-color: rgba(200,160,160,0.45);
      background: rgba(255,255,255,0.07);
    }

    .non-field-errors {
      background: rgba(220,80,80,0.12);
      border: 1px solid rgba(220,80,80,0.28);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #ff9999;
      margin-bottom: 20px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #c46060 0%, #8a3030 100%);
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .register-link {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #6a5a5a;
    }

    .register-link a {
      color: #c8a0a0;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      color: #e0c0c0;
    }

    .tagline {
      position: fixed;
      bottom: 32px;
      left: 48px;
      z-index: 5;
      color: rgba(255,255,255,0.18);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>

  <div class="tagline">Compete. Dominate. Rise.</div>

  <div class="login-panel">

    <div class="brand">
      <span class="brand-icon" style="color: #e63946;">⚔</span>
      <span class="brand-name">Esports System</span>
    </div>

    <form method="post">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="non-field-errors">
          {% for error in form.non_field_errors %}
            {{ error }}
          {% endfor %}
        </div>
      {% endif %}

      <div class="field-group">
        <label>Username</label>
        {{ form.username }}
      </div>

      <div class="field-group">
        <label>Password</label>
        {{ form.password }}
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <p class="register-link">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>

  </div>

</body>
</html>

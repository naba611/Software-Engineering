{% extends "base.html" %}
{% block title %}Create Team{% endblock %}

{% block content %}
<style>
  .page-header {
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: #d9a8a8;
    letter-spacing: 0.06em;
  }
  .page-header p {
    color: #a89a9a;
    font-size: 14px;
    margin-top: 6px;
  }

  .form-wrap {
    max-width: 520px;
    margin: 0 auto;
  }

  .form-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 28px 30px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #a89a9a;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #f0e0e0;
    font-size: 14px;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: rgba(217,168,168,0.5);
  }

  .error {
    color: #ff8a8a;
    font-size: 12px;
    margin-top: 4px;
  }

  .btn-submit {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #c46060, #a04040);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-submit:hover {
    background: linear-gradient(135deg, #d47070, #b05050);
  }

  .btn-back {
    display: inline-block;
    margin-top: 16px;
    padding: 7px 16px;
    border-radius: 6px;
    background: rgba(40,120,160,0.6);
    color: white;
    text-decoration: none;
    font-size: 13px;
  }

</style>

<!-- Header -->
<div class="page-header">
  <h1>Create Team</h1>
  <p>Build your squad and start competing.</p>
</div>

<div class="form-wrap">
  <div class="form-card">

    <form method="post">
      {% csrf_token %}

      {% for field in form %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="error">{{ field.errors }}</div>
          {% endif %}
        </div>
      {% endfor %}

      <button type="submit" class="btn-submit">
        Create Team
      </button>
    </form>

  </div>

  <a href="{% url 'team_list' %}" class="btn-back">← Back</a>
</div>

{% endblock %}

{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<style>
  .form-wrap {
    max-width: 640px;
    margin: 0 auto;
  }

  .form-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 28px 32px;
  }

  h2 {
    color: #d9a8a8;
    margin-bottom: 18px;
  }

  form p {
    margin-bottom: 14px;
  }

  input, select, textarea {
    width: 100%;
    padding: 9px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.3);
    color: #eee;
  }

  .btn-submit {
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    background: rgba(180,80,80,0.7);
    color: white;
    cursor: pointer;
  }

  .btn-submit:hover {
    opacity: 0.85;
  }

  .btn-back {
    display: inline-block;
    margin-top: 14px;
    font-size: 13px;
    color: #aaa;
    text-decoration: none;
  }

  /* Payment Notice */
  .notice {
    margin: 14px 0;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
  }

  .notice.warn {
    background: rgba(255, 193, 7, 0.08);
    border: 1px solid rgba(255, 193, 7, 0.4);
    color: #ffd86b;
  }

  .notice.success {
    background: rgba(40, 180, 100, 0.08);
    border: 1px solid rgba(40, 180, 100, 0.4);
    color: #7ee8a2;
  }
